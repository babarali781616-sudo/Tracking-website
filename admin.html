<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Stealth Tracker - Admin</title>
    <style>
        /* Same dashboard CSS from previous version */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            max-width: 1400px; margin: 0 auto;
            background: white; border-radius: 15px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white; padding: 30px; text-align: center;
        }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px; padding: 30px;
        }
        .stat-card {
            background: #f8f9ff; padding: 25px; border-radius: 12px;
            text-align: center; border-left: 5px solid #ff6b6b;
            transition: transform 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-number { font-size: 2.5em; font-weight: bold; color: #ff6b6b; margin-bottom: 10px; }
        .stat-label { color: #666; font-size: 1.1em; }
        .visitors-table { padding: 0 30px 30px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #ff6b6b; color: white; font-weight: 600; }
        tr:hover { background: #f8f9ff; }
        .live-indicator { width: 10px; height: 10px; background: #4ade80; border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .refresh-btn { background: #ff6b6b; color: white; border: none; padding: 12px 24px; border-radius: 25px; cursor: pointer; font-size: 1em; margin: 20px; transition: all 0.3s ease; }
        .refresh-btn:hover { background: #ee5a24; transform: scale(1.05); }
        .copy-ip { background: #10b981; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.8em; margin-left: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Stealth Tracker Admin</h1>
            <p>Real-time visitor intelligence</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalVisits">0</div>
                <div class="stat-label">Total Captures</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="uniqueIPs">0</div>
                <div class="stat-label">Unique IPs</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="liveVisitors">0</div>
                <div class="stat-label">Live (5min) <span class="live-indicator"></span></div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="todayVisits">0</div>
                <div class="stat-label">Today</div>
            </div>
        </div>
        
        <div class="visitors-table">
            <button class="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>IP <button class="copy-ip" onclick="copyAllIPs()">📋 Copy All</button></th>
                        <th>Location</th>
                        <th>Device</th>
                        <th>Time</th>
                        <th>ISP</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="visitorsTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const ADMIN_SECRET = 'admin-panel-99';
        
        async function loadData() {
            try {
                const response = await fetch('/admin-data', {
                    headers: { 'Authorization': `Bearer ${ADMIN_SECRET}` }
                });
                const data = await response.json();
                updateDashboard(data);
            } catch (e) {
                console.error('Load failed:', e);
            }
        }
        
        function updateDashboard(data) {
            document.getElementById('totalVisits').textContent = data.totalVisits;
            document.getElementById('uniqueIPs').textContent = data.uniqueIPs;
            document.getElementById('liveVisitors').textContent = data.liveVisitors;
            document.getElementById('todayVisits').textContent = data.todayVisits;
            
            const tbody = document.getElementById('visitorsTable');
            tbody.innerHTML = '';
            
            data.visitors.forEach(visitor => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${visitor.id}</td>
                    <td>
                        ${visitor.ip}
                        <button class="copy-ip" onclick="copyIP('${visitor.ip}')">📋</button>
                    </td>
                    <td>${visitor.location.full}</td>
                    <td>${visitor.platform} - ${visitor.screen}</td>
                    <td>${new Date(visitor.visitTime).toLocaleString()}</td>
                    <td>${visitor.location.isp || 'Unknown'}</td>
                    <td>
                        <button class="copy-ip" onclick="copyJSON(${JSON.stringify(visitor).replace(/"/g, '&quot;')})" style="background:#3b82f6;">JSON</button>
                    </td>
                `;
            });
        }
        
        function copyIP(ip) {
            navigator.clipboard.writeText(ip);
            alert('IP copied!');
        }
        
        function copyAllIPs() {
            const ips = Array.from(document.querySelectorAll('td:nth-child(2)'))
                .map(td => td.textContent.trim().split(' ')[0])
                .filter(ip => ip.includes('.'));
            navigator.clipboard.writeText(ips.join('\n'));
            alert(`${ips.length} IPs copied!`);
        }
        
        function copyJSON(data) {
            navigator.clipboard.writeText(JSON.stringify(data, null, 2));
            alert('Full JSON copied!');
        }
        
        // Auto-refresh every 3 seconds
        loadData();
        setInterval(loadData, 3000);
    </script>
</body>
</html>
