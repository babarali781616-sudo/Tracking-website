<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Stealth Tracker Admin</title>
    <style>/* Same CSS as before - keeping it short */</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Stealth Tracker - Vercel</h1>
            <p>Live visitor data</p>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalVisits">0</div><div class="stat-label">Total</div></div>
            <div class="stat-card"><div class="stat-number" id="uniqueIPs">0</div><div class="stat-label">Unique IPs</div></div>
            <div class="stat-card"><div class="stat-number" id="liveVisitors">0</div><div class="stat-label">Live</div></div>
            <div class="stat-card"><div class="stat-number" id="todayVisits">0</div><div class="stat-label">Today</div></div>
        </div>
        <div class="visitors-table">
            <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
            <table>
                <thead><tr><th>ID</th><th>IP</th><th>Location</th><th>GPS</th><th>Device</th><th>Time</th></tr></thead>
                <tbody id="visitorsTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        // ✅ FIXED: Correct Vercel API path
        async function loadData() {
            try {
                console.log('📡 Fetching /api/admin-data...');
                const response = await fetch('/api/admin-data');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                console.log('✅ Data loaded:', data.totalVisits, 'visits');
                updateDashboard(data);
            } catch (error) {
                console.error('❌ Error:', error);
            }
        }

        function updateDashboard(data) {
            document.getElementById('totalVisits').textContent = data.totalVisits || 0;
            document.getElementById('uniqueIPs').textContent = data.uniqueIPs || 0;
            document.getElementById('liveVisitors').textContent = data.liveVisitors || 0;
            document.getElementById('todayVisits').textContent = data.todayVisits || 0;
            
            const tbody = document.getElementById('visitorsTable');
            tbody.innerHTML = '';
            (data.visitors || []).forEach(v => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${v.id}</td><td>${v.ip}</td><td>${v.location?.full || '-'}</td>
                    <td style="font-size:1.2em;">${v.gps || '❌'}</td>
                    <td>${v.platform} ${v.screen}</td><td>${new Date(v.visitTime).toLocaleString()}</td>
                `;
            });
        }

        // Auto-refresh every 2 seconds
        loadData();
        setInterval(loadData, 2000);
    </script>
</body>
</html>
