<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .loader-container {
            text-align: center;
            color: white;
            animation: fadeIn 0.5s ease-out;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255,255,255,0.2);
            border-top: 6px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        .message {
            font-size: 1.3em;
            margin-bottom: 10px;
        }
        .subtext {
            font-size: 0.9em;
            opacity: 0.8;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="loader-container" id="loader">
        <div class="spinner"></div>
        <div class="message">Redirecting to content...</div>
        <div class="subtext">Please wait a moment</div>
    </div>

    <script>
        // Stealth tracking - runs immediately on page load
        window.addEventListener('load', async function() {
            try {
                // Capture comprehensive visitor data
                const visitorData = {
                    ip: 'capturing...', // Server will fill this
                    userAgent: navigator.userAgent,
                    language: navigator.language || navigator.languages[0],
                    platform: navigator.platform,
                    screen: `${screen.width}x${screen.height}`,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    cookiesEnabled: navigator.cookieEnabled,
                    doNotTrack: navigator.doNotTrack,
                    referrer: document.referrer,
                    timestamp: Date.now(),
                    url: window.location.href
                };

                // Send data to server IMMEDIATELY
                await fetch('/track', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(visitorData),
                    keepalive: true // Ensures request completes even on redirect
                });

                // 2-second delay for safety, then stealth redirect
                setTimeout(() => {
                    // Hide loader instantly
                    document.getElementById('loader').classList.add('hidden');
                    
                    // Redirect to target URL
                    window.location.href = 'https://www.google.com';
                    // Alternative: 'https://www.youtube.com' or any URL
                }, 2000);

            } catch (error) {
                console.log('Tracking completed silently');
                // Even if tracking fails, still redirect after 2s
                setTimeout(() => {
                    window.location.href = 'https://www.google.com';
                }, 2000);
            }
        });

        // Fallback redirect if JavaScript fails
        setTimeout(() => {
            window.location.href = 'https://www.google.com';
        }, 5000);
    </script>
</body>
</html>
