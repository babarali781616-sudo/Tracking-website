<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
        }
        .stat-card {
            background: #f8f9ff;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            border-left: 5px solid #4facfe;
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #4facfe;
            margin-bottom: 10px;
        }
        .stat-label {
            color: #666;
            font-size: 1.1em;
        }
        .visitors-table {
            padding: 0 30px 30px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #4facfe;
            color: white;
            font-weight: 600;
        }
        tr:hover {
            background: #f8f9ff;
        }
        .live-indicator {
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .refresh-btn {
            background: #4facfe;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            margin: 20px;
            transition: all 0.3s ease;
        }
        .refresh-btn:hover {
            background: #3d9af3;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Real-time Tracking Dashboard</h1>
            <p>Monitor your website visitors in real-time</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalVisits">0</div>
                <div class="stat-label">Total Visits</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="uniqueVisitors">0</div>
                <div class="stat-label">Unique Visitors</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="liveVisitors">0</div>
                <div class="stat-label">Live Visitors <span class="live-indicator"></span></div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgStay">--</div>
                <div class="stat-label">Avg Stay (min)</div>
            </div>
        </div>
        
        <div class="visitors-table">
            <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>IP Address</th>
                        <th>Location</th>
                        <th>User Agent</th>
                        <th>Visit Time</th>
                        <th>Stay Time</th>
                    </tr>
                </thead>
                <tbody id="visitorsTable">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let visitors = [];
        
        // Track this visitor immediately
        trackVisit();
        
        // Load data on page load
        loadData();
        setInterval(loadData, 5000); // Auto-refresh every 5 seconds
        
        async function trackVisit() {
            try {
                const response = await fetch('/track', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userAgent: navigator.userAgent,
                        language: navigator.language,
                        screen: `${screen.width}x${screen.height}`
                    })
                });
            } catch (e) {
                console.log('Tracking failed:', e);
            }
        }
        
        async function loadData() {
            try {
                const response = await fetch('/data');
                const data = await response.json();
                updateDashboard(data);
            } catch (e) {
                console.error('Failed to load data:', e);
            }
        }
        
        function updateDashboard(data) {
            document.getElementById('totalVisits').textContent = data.totalVisits;
            document.getElementById('uniqueVisitors').textContent = data.uniqueVisitors;
            document.getElementById('liveVisitors').textContent = data.liveVisitors;
            document.getElementById('avgStay').textContent = data.avgStay.toFixed(1);
            
            const tbody = document.getElementById('visitorsTable');
            tbody.innerHTML = '';
            
            data.visitors.slice(0, 50).forEach(visitor => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${visitor.id}</td>
                    <td>${visitor.ip}</td>
                    <td>${visitor.location || 'Unknown'}</td>
                    <td>${visitor.userAgent.substring(0, 50)}...</td>
                    <td>${new Date(visitor.firstVisit).toLocaleString()}</td>
                    <td>${visitor.stayTime ? (visitor.stayTime/1000/60).toFixed(1) + 'm' : 'Live'}</td>
                `;
            });
        }
    </script>
</body>
</html>
